[phases.setup]
nixPkgs = ["python312", "ffmpeg", "deno", "nodejs_20"]

[phases.build]
cmds = [
  # Setup yt-dlp config so both CLI and Python API use Deno for JS challenge solving.
  "mkdir -p /root/.config/yt-dlp",
  "cp yt-dlp.conf /root/.config/yt-dlp/config",
  # Clone and build bgutil PO token server (TypeScript → Node.js).
  # This provides YouTube BotGuard attestation tokens to bypass bot detection.
  "git clone --depth 1 https://github.com/Brainicism/bgutil-ytdlp-pot-provider.git /bgutil",
  "cd /bgutil/server && npm ci && npx tsc",
  # Ensure startup script is executable.
  "chmod +x start.sh",
]
